apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth-container
        image: YOUR-DOCKERHUB-USERNAME/auth-service:v1
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: swiggy-config
              key: APP_ENV
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: swiggy-secret
              key: DB_PASSWORD
        - name: JWT_KEY
          valueFrom:
            secretKeyRef:
              name: swiggy-secret
              key: JWT_KEY
